<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery Generator PRO</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0f1117;--surface:#181c26;--border:#2a2f3e;
  --accent:#4f8ef7;--green:#34d399;--red:#f87171;
  --text:#e8eaf0;--muted:#7a8099;--r:10px;
}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:32px 16px 80px;}
.wrap{max-width:780px;margin:auto;}
h1{font-size:22px;font-weight:700;margin-bottom:6px;}
h1 span{background:var(--accent);color:#fff;font-size:11px;padding:2px 8px;border-radius:4px;vertical-align:middle;margin-left:8px;}
.sub{color:var(--muted);font-size:13px;margin-bottom:28px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:22px;margin-bottom:18px;}
.label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:7px;}
.label::before{content:'';width:3px;height:13px;background:var(--accent);border-radius:2px;display:block;}
/* img rows */
.img-row{display:flex;gap:7px;align-items:center;margin-bottom:8px;}
.img-row input{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);font-size:13px;padding:8px 11px;border-radius:7px;outline:none;font-family:monospace;}
.img-row input:focus{border-color:var(--accent);}
.img-row input::placeholder{color:var(--muted);}
.ib{width:32px;height:32px;border:none;border-radius:6px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .15s;}
.ib:hover{opacity:.75;}
.ib-up,.ib-dn{background:#252a3a;color:#aab;}
.ib-del{background:#3a1818;color:var(--red);}
/* options */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:520px){.grid2{grid-template-columns:1fr;}}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:600;}
.field select,.field input[type=number]{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);font-size:13px;padding:8px 11px;border-radius:7px;outline:none;-webkit-appearance:none;}
.field select:focus,.field input[type=number]:focus{border-color:var(--accent);}
/* toggles */
.toggles{display:flex;flex-wrap:wrap;gap:14px;margin-top:4px;}
.tog{display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;user-select:none;}
.tog input{display:none;}
.sw{width:36px;height:20px;background:var(--border);border-radius:20px;position:relative;transition:background .2s;flex-shrink:0;}
.sw::after{content:'';position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:50%;background:#fff;transition:transform .2s;}
.tog input:checked+.sw{background:var(--accent);}
.tog input:checked+.sw::after{transform:translateX(16px);}
/* color */
.crow{display:flex;align-items:center;gap:10px;}
input[type=color]{width:42px;height:38px;border:1px solid var(--border);border-radius:7px;cursor:pointer;padding:2px;background:none;}
.chex{font-family:monospace;font-size:13px;color:var(--muted);}
/* buttons */
.btn{border:none;cursor:pointer;font-size:13px;font-weight:600;border-radius:8px;padding:10px 18px;display:inline-flex;align-items:center;gap:6px;transition:opacity .15s,transform .1s;font-family:inherit;}
.btn:hover{opacity:.85;transform:translateY(-1px);}
.btn-blue{background:var(--accent);color:#fff;}
.btn-green{background:#1a3328;color:var(--green);border:1px solid #264a3a;}
.btn-purple{background:#221a3f;color:#c4b5fd;border:1px solid #3a2a60;}
.btn-ghost{background:var(--surface);color:var(--muted);border:1px solid var(--border);}
.actions{display:flex;gap:10px;flex-wrap:wrap;}
/* output */
.out-box{display:none;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:18px;}
.out-head{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);background:#12151e;}
.out-title{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);}
.out-btns{display:flex;gap:8px;}
textarea#go{width:100%;height:200px;background:#0b0e14;border:none;color:#7dd3fc;font-family:monospace;font-size:11.5px;line-height:1.7;padding:16px;resize:vertical;outline:none;display:block;}
/* preview */
.prev-box{display:none;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:18px;}
.prev-head{padding:12px 16px;border-bottom:1px solid var(--border);background:#12151e;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:8px;}
.dot-live{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;animation:blink 1.4s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
iframe#pv{width:100%;height:400px;border:none;display:block;}
/* toast */
#toast{position:fixed;bottom:24px;right:24px;background:var(--green);color:#071a10;font-weight:700;font-size:13px;padding:11px 20px;border-radius:9px;opacity:0;transform:translateY(8px);transition:opacity .22s,transform .22s;pointer-events:none;z-index:9999;}
#toast.show{opacity:1;transform:none;}
</style>
</head>
<body>
<div class="wrap">

<h1>Gallery Generator <span>PRO</span></h1>
<p class="sub">Configura la galleria, anteprima live, poi copia il frammento in systeme.io</p>

<!-- IMMAGINI -->
<div class="card">
  <div class="label">Immagini</div>
  <div id="imgList"></div>
  <button class="btn btn-green" onclick="addRow()">+ Aggiungi immagine</button>
</div>

<!-- OPZIONI -->
<div class="card">
  <div class="label">Impostazioni</div>
  <div class="grid2">
    <div class="field">
      <label>Larghezza massima</label>
      <select id="optW">
        <option value="500px">Piccola (500px)</option>
        <option value="700px">Media (700px)</option>
        <option value="900px" selected>Grande (900px)</option>
        <option value="1100px">Molto grande (1100px)</option>
        <option value="100%">Piena larghezza</option>
      </select>
    </div>
    <div class="field">
      <label>Transizione</label>
      <select id="optFx">
        <option value="none">Nessuna</option>
        <option value="fade" selected>Fade</option>
      </select>
    </div>
    <div class="field">
      <label>Velocita autoplay (ms)</label>
      <input type="number" id="optSpd" value="3500" min="500" step="500">
    </div>
    <div class="field">
      <label>Colore sfondo</label>
      <div class="crow">
        <input type="color" id="optBg" value="#111111" oninput="document.getElementById('bgHex').textContent=this.value">
        <span class="chex" id="bgHex">#111111</span>
      </div>
    </div>
  </div>
  <div style="margin-top:18px;">
    <div class="label" style="margin-bottom:12px;">Elementi visibili</div>
    <div class="toggles">
      <label class="tog"><input type="checkbox" id="optAuto" checked><span class="sw"></span>Autoplay</label>
      <label class="tog"><input type="checkbox" id="optArr" checked><span class="sw"></span>Frecce</label>
      <label class="tog"><input type="checkbox" id="optTh" checked><span class="sw"></span>Thumbnails</label>
      <label class="tog"><input type="checkbox" id="optDots" checked><span class="sw"></span>Pallini</label>
    </div>
  </div>
</div>

<!-- GENERA -->
<div class="actions" style="margin-bottom:18px;">
  <button class="btn btn-blue" onclick="generate()">Genera codice</button>
</div>

<!-- ANTEPRIMA -->
<div class="prev-box" id="prevBox">
  <div class="prev-head"><span class="dot-live"></span>Anteprima live</div>
  <iframe id="pv" title="preview"></iframe>
</div>

<!-- OUTPUT -->
<div class="out-box" id="outBox">
  <div class="out-head">
    <span class="out-title">Codice per systeme.io</span>
    <div class="out-btns">
      <button class="btn btn-purple" onclick="copyCode()">Copia</button>
      <button class="btn btn-ghost" onclick="downloadCode()">Scarica .html</button>
    </div>
  </div>
  <textarea id="go" readonly spellcheck="false"></textarea>
</div>

</div>
<div id="toast">Copiato!</div>

<script>
(function(){

  /* ---- RIGHE IMMAGINE ---- */
  function addRow(url){
    var list = document.getElementById('imgList');
    var row  = document.createElement('div');
    row.className = 'img-row';

    var inp = document.createElement('input');
    inp.type = 'text';
    inp.placeholder = 'https://esempio.com/foto.jpg';
    if(url) inp.value = url;

    function mkBtn(cls, label, fn){
      var b = document.createElement('button');
      b.className = 'ib ' + cls;
      b.textContent = label;
      b.type = 'button';
      b.onclick = fn;
      return b;
    }

    row.appendChild(inp);
    row.appendChild(mkBtn('ib-up',  'up',  function(){ if(row.previousElementSibling) list.insertBefore(row, row.previousElementSibling); }));
    row.appendChild(mkBtn('ib-dn',  'dn',  function(){ if(row.nextElementSibling)     list.insertBefore(row.nextElementSibling, row); }));
    row.appendChild(mkBtn('ib-del', 'X',   function(){ list.removeChild(row); }));
    list.appendChild(row);
    inp.focus();
  }
  window.addRow = addRow;

  function getImages(){
    var imgs = [];
    document.querySelectorAll('#imgList input').forEach(function(i){ if(i.value.trim()) imgs.push(i.value.trim()); });
    return imgs;
  }

  /* ---- BUILD CODICE GALLERIA ---- */
  function buildGallery(images){
    var w    = document.getElementById('optW').value;
    var fx   = document.getElementById('optFx').value;
    var spd  = parseInt(document.getElementById('optSpd').value)||3500;
    var bg   = document.getElementById('optBg').value;
    var auto = document.getElementById('optAuto').checked;
    var arr  = document.getElementById('optArr').checked;
    var th   = document.getElementById('optTh').checked;
    var dots = document.getElementById('optDots').checked;

    /* -- HTML -- */
    var h = '<div class="gmw">';
    h += '<div class="gmm">';
    h += '<img id="gmi" src="" alt="gallery"/>';
    if(arr){
      h += '<button class="gmp" id="gmp">&#10094;</button>';
      h += '<button class="gmn" id="gmn">&#10095;</button>';
    }
    h += '<div class="gmhint" id="gmhint">Premi ESC per uscire</div>';
    h += '</div>';
    if(dots) h += '<div class="gmdots" id="gmdots"></div>';
    if(th)   h += '<div class="gmthumbs" id="gmthumbs"></div>';
    h += '</div>';

    /* -- CSS -- */
    var c = '.gmw{max-width:'+w+';margin:0 auto;background:'+bg+';padding:14px;border-radius:10px;box-sizing:border-box;}';
    c += '.gmm{position:relative;border-radius:8px;overflow:hidden;}';
    c += '#gmi{width:100%;display:block;border-radius:8px;cursor:zoom-in;'+(fx==='fade'?'transition:opacity .35s;':'')+'}';
    c += '.gmp,.gmn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.55);color:#fff;border:none;width:40px;height:40px;border-radius:50%;font-size:16px;cursor:pointer;z-index:5;display:flex;align-items:center;justify-content:center;}';
    c += '.gmp{left:8px;}.gmn{right:8px;}';
    c += '.gmp:hover,.gmn:hover{background:rgba(0,0,0,.85);}';
    c += '.gmdots{display:flex;justify-content:center;gap:7px;margin-top:10px;}';
    c += '.gmdot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.3);border:none;cursor:pointer;padding:0;transition:background .2s,transform .2s;}';
    c += '.gmdot.on{background:#fff;transform:scale(1.35);}';
    c += '.gmthumbs{display:flex;gap:7px;margin-top:10px;overflow-x:auto;padding-bottom:3px;}';
    c += '.gmthumbs::-webkit-scrollbar{height:3px;}.gmthumbs::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:3px;}';
    c += '.gmth{width:70px;height:48px;object-fit:cover;border-radius:5px;cursor:pointer;opacity:.45;flex-shrink:0;border:2px solid transparent;transition:opacity .2s;}';
    c += '.gmth.on{opacity:1;border-color:#fff;}';
    c += '.gmhint{display:none;position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.78);color:#fff;padding:8px 18px;border-radius:18px;font-size:14px;z-index:9999;pointer-events:none;white-space:nowrap;}';
    c += ':fullscreen .gmp,:fullscreen .gmn{display:flex!important;}';
    c += ':-webkit-full-screen .gmp,:-webkit-full-screen .gmn{display:flex!important;}';
    c += ':fullscreen .gmhint{display:block!important;}';
    c += ':-webkit-full-screen .gmhint{display:block!important;}';

    /* -- JS -- */
    /* I tag script/style li costruiamo spezzati in fase di assemblaggio */
    var j = '(function(){';
    j += 'var imgs='+JSON.stringify(images)+';';
    j += 'var idx=0;';
    j += 'var el=document.getElementById("gmi");';
    j += 'var wrap=document.querySelector(".gmw");';
    j += 'var hint=document.getElementById("gmhint");';

    /* renderDots */
    if(dots){
      j += 'function rDots(){';
      j += 'var c=document.getElementById("gmdots");if(!c)return;';
      j += 'c.innerHTML="";';
      j += 'imgs.forEach(function(_,i){';
      j += 'var b=document.createElement("button");';
      j += 'b.className="gmdot"+(i===idx?" on":"");';
      j += 'b.onclick=function(){idx=i;upd();};';
      j += 'c.appendChild(b);});}';
    } else {
      j += 'function rDots(){}';
    }

    /* renderThumbs */
    if(th){
      j += 'function rTh(){';
      j += 'var c=document.getElementById("gmthumbs");if(!c)return;';
      j += 'c.innerHTML="";';
      j += 'imgs.forEach(function(src,i){';
      j += 'var t=document.createElement("img");';
      j += 't.src=src;';
      j += 't.className="gmth"+(i===idx?" on":"");';
      j += 't.onclick=function(){idx=i;upd();};';
      j += 'c.appendChild(t);});}';
    } else {
      j += 'function rTh(){}';
    }

    /* update */
    j += 'function upd(){';
    if(fx==='fade'){
      j += 'el.style.opacity=0;';
      j += 'setTimeout(function(){el.src=imgs[idx];el.style.opacity=1;},180);';
    } else {
      j += 'el.src=imgs[idx];';
    }
    j += 'rDots();rTh();}';

    /* go */
    j += 'function go(d){idx=(idx+d+imgs.length)%imgs.length;upd();}';

    /* arrows */
    if(arr){
      j += 'document.getElementById("gmp").onclick=function(e){e.stopPropagation();go(-1);};';
      j += 'document.getElementById("gmn").onclick=function(e){e.stopPropagation();go(1);};';
    }

    /* fullscreen */
    j += 'el.onclick=function(){';
    j += 'if(!document.fullscreenElement&&!document.webkitFullscreenElement){';
    j += '(wrap.requestFullscreen||wrap.webkitRequestFullscreen||function(){}).call(wrap);';
    j += '}else{';
    j += '(document.exitFullscreen||document.webkitExitFullscreen||function(){}).call(document);}};';

    /* hint ESC */
    j += 'function chkFs(){';
    j += 'var f=!!(document.fullscreenElement||document.webkitFullscreenElement);';
    j += 'if(hint)hint.style.display=f?"block":"none";}';
    j += 'document.addEventListener("fullscreenchange",chkFs);';
    j += 'document.addEventListener("webkitfullscreenchange",chkFs);';

    /* keyboard */
    j += 'document.addEventListener("keydown",function(e){';
    j += 'if(e.key==="ArrowRight")go(1);';
    j += 'else if(e.key==="ArrowLeft")go(-1);});';

    /* autoplay */
    if(auto){
      j += 'setInterval(function(){go(1);},'+spd+');';
    }

    j += 'upd();';
    j += '})();';

    /* Assembla: i tag li costruiamo spezzati cosi il browser
       non li intercetta leggendo il sorgente del tool */
    var os = '<'+'style'+'>';
    var cs = '<'+'/style'+'>';
    var oj = '<'+'script'+'>';
    var cj = '<'+'/script'+'>';

    return h + os + c + cs + oj + j + cj;
  }

  /* ---- GENERA ---- */
  window.generate = function(){
    var imgs = getImages();
    if(!imgs.length){ alert('Aggiungi almeno una immagine!'); return; }

    var code = buildGallery(imgs);

    /* textarea output */
    document.getElementById('go').value = code;
    document.getElementById('outBox').style.display = 'block';

    /* anteprima iframe via srcdoc */
    var doc = '<!DOCTYPE html><html><head><meta charset="UTF-8">'
            + '<'+'style'+'>body{margin:0;padding:20px;background:#1a1a1a;}<'+'/style'+'>'
            + '</head><body>' + code + '</body></html>';
    document.getElementById('pv').srcdoc = doc;
    document.getElementById('prevBox').style.display = 'block';

    document.getElementById('prevBox').scrollIntoView({behavior:'smooth',block:'start'});
  };

  /* ---- COPIA ---- */
  window.copyCode = function(){
    var ta = document.getElementById('go');
    ta.select();
    try{ navigator.clipboard.writeText(ta.value); }catch(e){ document.execCommand('copy'); }
    var t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(function(){ t.classList.remove('show'); }, 2000);
  };

  /* ---- SCARICA ---- */
  window.downloadCode = function(){
    var frag = document.getElementById('go').value;
    if(!frag){ alert('Prima genera il codice!'); return; }
    var full = '<!DOCTYPE html>\n<html lang="it">\n<head>\n'
             + '<meta charset="UTF-8">\n'
             + '<meta name="viewport" content="width=device-width,initial-scale=1">\n'
             + '<title>Galleria</title>\n</head>\n'
             + '<body style="margin:0;padding:20px;background:#1a1a1a;">\n'
             + frag + '\n</body>\n</html>';
    var b = new Blob([full],{type:'text/html'});
    var a = document.createElement('a');
    a.href = URL.createObjectURL(b);
    a.download = 'galleria.html';
    a.click();
    URL.revokeObjectURL(a.href);
  };

  /* ---- INIT ---- */
  addRow(); addRow(); addRow();

})();
</script>
</body>
</html>
